packages:
  - playground/*
  - packages/*

allowBuilds:
  esbuild: true

autoInstallPeers: true

catalogs:
  build:
    tsdown: ^0.22.0
    tsx: ^4.21.0
    typescript: ^6.0.3
    unplugin: ^3.0.0
    unplugin-utils: ^0.3.1
    vite: ^8.0.12
    vite-plugin-dts: ^5.0.0
  icons:
    '@iconify-json/catppuccin': ^1.2.17
    '@iconify-json/hugeicons': ^1.2.27
    '@iconify/utils': ^3.1.3
  lint:
    '@antfu/eslint-config': ^9.0.0
    eslint: ^10.3.0
  plugins:
    vite-dev-rpc: ^2.0.0
  test:
    vitest: ^4.1.6
  unocss:
    '@unocss/core': ^66.6.8
    '@unocss/preset-web-fonts': ^66.6.8
    '@unocss/preset-wind4': ^66.6.8
    unocss: ^66.6.8
  utils:
    '@types/node': ^24.12.4
    debug: ^4.4.3
    esno: ^4.8.0
    taze: ^19.11.0
    tinyglobby: ^0.2.16
  vue:
    '@vitejs/plugin-vue': ^6.0.6
    '@vueuse/core': ^14.3.0
    vue: ^3.5.34
    vue-tsc: ^3.2.9

ignoreWorkspaceRootCheck: true

onlyBuiltDependencies:
  - core-js
  - esbuild

shamefullyHoist: true

strictPeerDependencies: false
